# AI IDE — 备案域名 + IP 内测并存（正式证书由 setup-ssl-certbot.sh 申请）
# server_name 含中文域名与 punycode

upstream ai_ide_api {
    server 127.0.0.1:3001;
    keepalive 16;
}

# --- IP 内测（自签名 HTTPS，过渡期保留）---
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 47.105.110.136 _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name 47.105.110.136 _;

    ssl_certificate     /etc/nginx/ssl/ip-selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/ip-selfsigned.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root /opt/ai-ide/dist;
    index index.html;

    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /api/ {
        proxy_pass http://ai_ide_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /signup { try_files /signup.html =404; }
    location /login { try_files /login.html =404; }
    location /website/ { try_files $uri $uri/ =404; }
    location /downloads/ {
        alias /opt/ai-ide/dist/downloads/;
        default_type application/octet-stream;
        add_header Content-Disposition "attachment" always;
    }
    location / { try_files $uri $uri/ /index.html; }
}

# --- 备案域名 HTTP（certbot 验证 + 未上 SSL 前可访问）---
server {
    listen 80;
    listen [::]:80;
    server_name 许红花.com xn--um0a26fb1j.com www.许红花.com www.xn--um0a26fb1j.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    root /opt/ai-ide/dist;
    index index.html;

    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /api/ {
        proxy_pass http://ai_ide_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /signup { try_files /signup.html =404; }
    location /login { try_files /login.html =404; }
    location /website/ { try_files $uri $uri/ =404; }
    location /downloads/ {
        alias /opt/ai-ide/dist/downloads/;
        default_type application/octet-stream;
        add_header Content-Disposition "attachment" always;
    }
    location / { try_files $uri $uri/ /index.html; }
}

