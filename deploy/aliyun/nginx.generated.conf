# AI IDE — 阿里云 ECS + Nginx 示例
# 1. 复制到 /etc/nginx/conf.d/ai-ide.conf
# 2. 将 许红花.com xn--um0a26fb1j.com、root、证书路径替换为实际值
# 3. 备案通过并配置 SSL 后再启用 443 server
# 4. nginx -t && systemctl reload nginx

upstream ai_ide_api {
    server 127.0.0.1:3001;
    keepalive 16;
}

# 备案完成前：可用 IP 访问做 API 内测（勿对公网宣传域名）
server {
    listen 80;
    server_name 许红花.com xn--um0a26fb1j.com www.许红花.com xn--um0a26fb1j.com;

    # 备案审核期间：域名不要解析到大陆 IP；通过后再取消注释 root
    root /opt/ai-ide/dist;
    index index.html;

    # WebContainer 必需（与 vercel.json 一致）
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /api/ {
        proxy_pass http://ai_ide_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /signup {
        try_files /signup.html =404;
    }

    location /login {
        try_files /login.html =404;
    }

    location /website/ {
        try_files $uri $uri/ =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# 备案 + SSL 证书（阿里云免费 DV 或 Let's Encrypt）后启用：
