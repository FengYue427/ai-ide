# AI IDE — IP 内测 HTTPS（自签名，WebContainer 需要 Secure Context）
# 浏览器会提示「不安全」→ 高级 → 继续访问即可
# 备案通过后改用 deploy/aliyun/nginx.generated.conf + 正式证书

upstream ai_ide_api {
    server 127.0.0.1:3001;
    keepalive 16;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 47.105.110.136 _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name 47.105.110.136 _;

    ssl_certificate     /etc/nginx/ssl/ip-selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/ip-selfsigned.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root /opt/ai-ide/dist;
    index index.html;

    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /api/ {
        proxy_pass http://ai_ide_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /signup {
        try_files /signup.html =404;
    }

    location /login {
        try_files /login.html =404;
    }

    location /website/ {
        try_files $uri $uri/ =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
