<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>注册 AI IDE — 免费 AI 原生编程环境</title>
    <meta
      name="description"
      content="注册 AI IDE 云账号：无需自备 API Key 即可开始 AI 对话与 Agent，支持 WebContainer 与桌面版。"
    />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="/signup" />
    <meta property="og:title" content="注册 AI IDE" />
    <meta property="og:description" content="免费注册，使用平台 AI 或自带 API Key 开始编程。" />
    <meta property="og:url" content="/signup" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="stylesheet" href="/auth-landing.css" />
  </head>
  <body>
    <main class="auth-landing">
      <div class="auth-landing__brand">
        <img src="/logo.svg" alt="AI IDE" width="40" height="40" />
        <strong>AI IDE</strong>
      </div>

      <div class="auth-landing__card">
        <h1>注册 AI IDE</h1>
        <p>
          AI IDE 是开源、AI 原生的轻量编程环境。注册云账号后可同步工作区、订阅与
          <strong>平台 AI</strong>（无需自己申请 DeepSeek/OpenAI Key，类似 Cursor 开箱即用）。
        </p>
        <p class="auth-landing__notice">
          国内内测站（备案中）与海外站账号不互通。请使用邮箱在此注册新账号。
        </p>
        <ul>
          <li>浏览器即用 · WebContainer 运行 Node</li>
          <li>可选 Electron 桌面版打开本地文件夹</li>
          <li>免费版每日配额 · 专业版更高额度</li>
        </ul>
        <div class="auth-landing__actions">
          <a class="auth-landing__btn" href="/?auth=register">打开 IDE 并完成注册</a>
          <a class="auth-landing__link" href="/login">已有账号？登录</a>
        </div>
      </div>

      <p class="auth-landing__footer">
        <a href="/">返回首页</a> · <a href="/legal/privacy.html">隐私政策</a>
      </p>
    </main>
  </body>
</html>
