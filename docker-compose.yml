services:
  postgres:
    image: postgres:16
    container_name: ai-ide-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_ide
    volumes:
      - ai_ide_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_ide"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  ai_ide_pg_data:
