# Build Windows + macOS desktop artifacts and attach to GitHub Release.
# Trigger: version tags (v*.*.*) — separate from Vercel web deploy.
name: Desktop release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CSC_IDENTITY_AUTO_DISCOVERY: 'false'

jobs:
  win-desktop:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # node-gyp (node-pty) requires distutils (removed in Python 3.12+ on Windows runners).
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: npm ci

      - name: Rebuild node-pty for Electron
        env:
          PYTHON: python
        run: node scripts/electron-rebuild-pty.mjs

      - name: Build & publish Windows to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHON: python
        run: node scripts/electron-builder-run.mjs --win portable nsis --publish always

  mac-desktop:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # node-gyp (node-pty) currently requires distutils which is absent in Python 3.12.
      # Pin to Python 3.11 for macOS builds.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: npm ci

      - name: Build & publish macOS to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHON: python3
        run: node scripts/electron-builder-run.mjs --mac dmg zip --publish always
