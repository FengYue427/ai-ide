# Build verification only. Production deploys go to Vercel (see README).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  mlp-preflight:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run mlp:preflight

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck + build (Vercel production parity)
        run: npm test

      - name: Unit tests
        run: npm run test:unit

      - name: Smoke test (artifacts)
        run: npm run test:smoke

  desktop-mac-build:
    runs-on: macos-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # node-gyp (node-pty) currently requires distutils which is absent in Python 3.12.
      # Pin to Python 3.11 for macOS builds.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: npm ci

      - name: Build macOS desktop (unsigned smoke)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          PYTHON: python3
        run: node scripts/electron-builder-run.mjs --mac dmg zip --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-desktop-ci
          path: release/AI-IDE-*-mac-*
          if-no-files-found: error

  integration-api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_ide
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ai_ide"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_ide
      AUTH_SECRET: ci-integration-test-secret-change-me
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prepare database
        run: npx prisma generate && npx prisma db push && npm run db:seed

      - name: API integration tests
        run: npm run test:integration:local
        env:
          SKIP_DB_SETUP: '1'
          NODE_ENV: development
          CRON_SECRET: ci-integration-cron-secret
          PLUGIN_PUBLISH_ENABLED: 'true'
          PLUGIN_OFFICIAL_PUBLIC_KEY: '0b/3O2Xi1DnGOcc907JnK3OCxfpzRjk7WYP24XOggKI='

      - name: Security baseline (P0')
        run: node scripts/security-baseline.mjs

      - name: Upload API log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-server-log
          path: api-server.log
          if-no-files-found: ignore

  e2e-ui:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Build static app for E2E preview
        run: npm run build

      - name: E2E tests (UI only)
        run: npm run test:e2e
        env:
          CI: 'true'
          E2E_TARGET: ui
          AUTH_SECRET: ci-e2e-ui-test-secret-change-me-32chars

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-ui
          path: playwright-report/
          if-no-files-found: ignore

  e2e-stack:
    runs-on: ubuntu-latest
    needs: integration-api
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_ide
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ai_ide"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_ide
      AUTH_SECRET: ci-integration-test-secret-change-me
      CI: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prepare database
        run: npx prisma generate && npx prisma db push && npm run db:seed

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: E2E tests (full stack)
        run: npm run test:e2e:stack
        env:
          E2E_TARGET: fullstack

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-fullstack
          path: playwright-report/
          if-no-files-found: ignore

  e2e-collab:
    runs-on: ubuntu-latest
    needs: integration-api
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_ide
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ai_ide"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_ide
      AUTH_SECRET: ci-integration-test-secret-change-me
      CI: 'true'
      E2E_TARGET: collab
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prepare database
        run: npx prisma generate && npx prisma db push && npm run db:seed

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: E2E tests (collaboration M1, optional)
        run: npm run test:e2e:collab

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-collab
          path: playwright-report/
          if-no-files-found: ignore
